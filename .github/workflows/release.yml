name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifacts: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifacts: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifacts: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (Tauri)
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: y7ke-${{ matrix.platform }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.deb' -o \
            -name '*.AppImage' -o \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.msi' -o \
            -name '*.exe' \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Extract release notes for this tag
        id: notes
        run: |
          if [ -f docs/RELEASE_NOTES_V1.md ]; then
            echo "body_path=docs/RELEASE_NOTES_V1.md" >> "$GITHUB_OUTPUT"
          else
            echo "body_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Y7KE ${{ github.ref_name }}"
          body_path: ${{ steps.notes.outputs.body_path }}
          files: release/*
          draft: true
          prerelease: false
          generate_release_notes: true
