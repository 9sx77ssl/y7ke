name: release

# Combined "tag + build + publish" pipeline.
#
# Triggers:
#   - push to main → derive version from Cargo.toml; if no matching
#     `vX.Y.Z` tag exists yet, create one and continue; if it does,
#     skip silently. This is the auto-release path that fires for
#     every commit (the pre-commit hook bumps the patch version).
#   - push of a `v*` tag (manual) → build that tag.
#
# We have to do tag creation inside this workflow rather than in a
# separate one because GITHUB_TOKEN-created tag pushes don't trigger
# follow-up workflows (anti-loop policy).

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  resolve:
    name: resolve version + tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag:     ${{ steps.ver.outputs.tag }}
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            tag="v$version"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "resolved $tag (version=$version)"

      - name: Gate — is this tag already released?
        id: gate
        run: |
          # If a release already exists for this tag, don't republish.
          # gh CLI exits non-zero when the release isn't found.
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            # Loud, not silent: a branch push that lands here without a
            # version bump (hookless squash/merge/contributor) would
            # otherwise drop its release with a green check. Surface it.
            if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
              echo "::warning::release for $TAG already exists — skipping. Did the version get bumped? Hookless merges/squashes don't bump the version."
            else
              echo "release for $TAG already exists — skipping"
            fi
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true"  >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          REPO: ${{ github.repository }}

      - name: Create + push tag if missing
        if: steps.gate.outputs.proceed == 'true' && github.ref_type == 'branch'
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "tag already exists locally — fine"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${{ steps.ver.outputs.tag }}"
            git push origin "${{ steps.ver.outputs.tag }}"
          fi

  # Quality gate: a release must pass the same deterministic checks CI runs
  # (fmt + clippy -D warnings + tsc + UI build + lib tests) BEFORE we build
  # and publish bundles. Without this, release.yml races ci.yml on the push
  # and could ship a tag for a commit that fails lint/type/tests.
  gate:
    needs: resolve
    if: needs.resolve.outputs.proceed == 'true'
    name: quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: ui

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --lib --no-fail-fast
      - run: pnpm tsc --noEmit
        working-directory: ui
      - run: pnpm build
        working-directory: ui

  build:
    needs: [resolve, gate]
    if: needs.resolve.outputs.proceed == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    # Linux is the canonical target and must succeed; Windows is best-effort
    # (mirrors ci.yml) so a Windows-only bundling failure reports loudly but
    # doesn't block the Linux release from publishing.
    continue-on-error: ${{ matrix.platform == 'windows-latest' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Install tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Build (Tauri) — Linux AppImage only
        if: matrix.platform == 'ubuntu-latest'
        run: cargo tauri build --bundles appimage

      - name: Build (Tauri) — Windows NSIS only
        if: matrix.platform == 'windows-latest'
        run: cargo tauri build --bundles nsis

      - name: Upload Linux AppImage
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: y7ke-linux
          path: target/release/bundle/appimage/*.AppImage
          # error (not warn): a bundle that produces no file must fail the
          # build so we never publish a release missing a platform binary.
          if-no-files-found: error

      - name: Upload Windows .exe
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: y7ke-windows
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish:
    needs: [resolve, build]
    if: needs.resolve.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.AppImage' -o \
            -name '*.exe' \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          version="${{ needs.resolve.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$version" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; print; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > release/NOTES.md
          fi
          if [ ! -s release/NOTES.md ]; then
            echo "_(no CHANGELOG entry for v$version)_" > release/NOTES.md
          fi
          echo "body_path=release/NOTES.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: "Y7KE ${{ needs.resolve.outputs.tag }}"
          body_path: ${{ steps.notes.outputs.body_path }}
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
