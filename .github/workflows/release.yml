name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            label: linux
          - platform: macos-latest
            label: macos
          - platform: windows-latest
            label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Install tauri-cli (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Build (Tauri)
        run: cargo tauri build

      # Rename the raw Linux binary so it has an unambiguous filename in the release.
      - name: Package Linux binary
        if: matrix.platform == 'ubuntu-latest'
        run: |
          cp src-tauri/target/release/y7ke y7ke-linux-x86_64
          tar czf y7ke-linux-x86_64.tar.gz y7ke-linux-x86_64

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: y7ke-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            y7ke-linux-x86_64.tar.gz
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: y7ke-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: y7ke-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.deb' -o \
            -name '*.AppImage' -o \
            -name '*.tar.gz' -o \
            -name '*.dmg' -o \
            -name '*.msi' -o \
            -name '*.exe' \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$tag" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; print; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > release/NOTES.md
          fi
          if [ ! -s release/NOTES.md ]; then
            echo "_(no CHANGELOG entry for ${GITHUB_REF_NAME})_" > release/NOTES.md
          fi
          echo "body_path=release/NOTES.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Y7KE ${{ github.ref_name }}"
          body_path: ${{ steps.notes.outputs.body_path }}
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
