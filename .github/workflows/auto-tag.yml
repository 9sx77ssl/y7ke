name: auto-tag

# Every push to main bumps the patch version via the pre-commit hook,
# but no git tag is created — so the release workflow (which triggers
# on `v*` tags) never fires. This workflow reads the version from
# Cargo.toml and pushes a matching tag if it doesn't yet exist; the
# tag push then triggers release.yml.

on:
  push:
    branches: [main]

# Skip when the commit IS itself the auto-tag's "version bump"
# (avoid infinite loops). The pre-commit hook bumps before push, so
# every push has a new version — but we only tag if the tag is missing.

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: ver
        run: |
          v=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v"   >> "$GITHUB_OUTPUT"

      - name: Bail if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create + push tag
        if: steps.check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
          echo "tagged ${{ steps.ver.outputs.tag }} — release workflow will pick it up"
