name: CI

# Trim policy:
#   - Linux is the canonical dev target → all checks always run there.
#   - macOS / Windows builds only run on tag pushes (release prep) and
#     pull requests (so contributors get cross-platform feedback). They
#     don't gate every main commit — that wasted ~10 min per push.
#   - Tauri-build is folded into the rust job on Linux to save a checkout.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0

jobs:
  linux:
    name: linux / fmt + clippy + test + tauri-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: ui

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests (skip slow integration suites on push)
        # On push to main we run unit tests + the fastest integrations.
        # The heavyweight scenarios (offline-sync, three_node_kad,
        # restart_both) take 30-60s each — gate them to tags + PRs.
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "branch" ]]; then
            cargo test --workspace --lib --no-fail-fast
          else
            cargo test --workspace --no-fail-fast
          fi

      - run: pnpm tsc --noEmit
        working-directory: ui
      - run: pnpm build
        working-directory: ui

      - name: Build release binary
        run: cargo build --release -p y7ke-tauri --features custom-protocol

  cross-platform:
    name: cross-platform / ${{ matrix.os }}
    # Only on tags + PRs — not every main push.
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: ui

      - run: cargo test --workspace --lib --no-fail-fast
      - run: pnpm build
        working-directory: ui
      - run: cargo build --release -p y7ke-tauri --features custom-protocol
